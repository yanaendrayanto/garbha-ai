<!DOCTYPE html>
<html>
<head>
  <title>Pixel Rain Avoiding Body - Umbrella Effect</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let particles = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLE =================
class Particle{
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*0.5;
    this.vy = Math.random()*3 + 2;
    this.size = Math.random()*4 + 4;
    this.alpha = Math.random()*0.5 + 0.5;
  }
  update(bodyBounds){
    // Jika berada di area tubuh, lompatkan ke samping
    let insideBody = bodyBounds.some(b=>{
      return this.x > b.x1 && this.x < b.x2 && this.y > b.y1 && this.y < b.y2;
    });
    if(insideBody){
      // pindahkan partikel ke samping secara random
      const shift = (Math.random()<0.5? -1 : 1) * 50;
      this.x += shift;
      this.y -= 10; // sedikit naik agar tidak menempel tubuh
    }
    // jatuh
    this.x += this.vx;
    this.y += this.vy;

    if(this.y > canvas.height) this.y = -10;
    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
  }
  draw(ctx){
    ctx.fillStyle = `rgba(0,180,255,${this.alpha})`;
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

// ================= BODY AREA =================
function getBodyBounds(poses){
  // buat kotak pembatas tubuh dari keypoints
  let bounds = [];
  poses.forEach(p=>{
    const xVals = p.keypoints.filter(k=>k.score>0.4).map(k=>k.x);
    const yVals = p.keypoints.filter(k=>k.score>0.4).map(k=>k.y);
    if(xVals.length && yVals.length){
      const x1 = Math.min(...xVals);
      const x2 = Math.max(...xVals);
      const y1 = Math.min(...yVals);
      const y2 = Math.max(...yVals);
      bounds.push({x1,x2,y1,y2});
    }
  });
  return bounds;
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  // buat partikel awal
  for(let i=0;i<1000;i++){
    particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
  }

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    const bodyBounds = getBodyBounds(poses);

    // update dan draw partikel
    particles.forEach(p=>{
      p.update(bodyBounds);
      p.draw(ctx);
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
