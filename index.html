<!DOCTYPE html>
<html>
<head>
  <title>Heavy Rain Avoiding Body (Nose Down) + Audio</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let particles = [];

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
let firstClick = false;
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLE =================
class Particle{
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*0.3; // miring sedikit
    this.vy = Math.random()*8 + 4; // hujan deras
    this.size = Math.random()*2 + 2;
    this.alpha = Math.random()*0.5 + 0.5;
  }
  update(bodyBounds){
    // hindari tubuh (dari hidung ke bawah)
    let insideBody = bodyBounds.some(b=>{
      return this.x > b.x1 && this.x < b.x2 && this.y > b.y1 && this.y < b.y2;
    });
    if(insideBody){
      const shift = (Math.random()<0.5? -1 : 1) * 50;
      this.x += shift;
      this.y -= 10;
    }

    this.x += this.vx;
    this.y += this.vy;

    if(this.y > canvas.height) this.y = -10;
    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
  }
  draw(ctx){
    ctx.fillStyle = `rgba(0,180,255,${this.alpha})`;
    ctx.fillRect(this.x,this.y,this.size,this.size*3);
  }
}

// ================= BODY AREA =================
// Hanya hitung tubuh dari hidung ke bawah
function getBodyBounds(poses){
  let bounds = [];
  poses.forEach(p=>{
    const keypoints = p.keypoints.filter(k=>k.score>0.4);
    const relevant = keypoints.filter(k=>{
      // Ambil semua keypoints mulai dari 'nose' ke bawah
      const order = ['nose','left_eye','right_eye','left_ear','right_ear',
                     'left_shoulder','right_shoulder','left_elbow','right_elbow',
                     'left_wrist','right_wrist','left_hip','right_hip',
                     'left_knee','right_knee','left_ankle','right_ankle'];
      const index = order.indexOf(k.name);
      return index >= 0 && index >= order.indexOf('nose'); 
    });

    if(relevant.length){
      const xVals = relevant.map(k=>k.x);
      const yVals = relevant.map(k=>k.y);
      bounds.push({
        x1: Math.min(...xVals),
        x2: Math.max(...xVals),
        y1: Math.min(...yVals),
        y2: Math.max(...yVals)
      });
    }
  });
  return bounds;
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  // buat hujan deras
  for(let i=0;i<2000;i++){
    particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
  }

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    const bodyBounds = getBodyBounds(poses);

    // update & draw partikel
    particles.forEach(p=>{
      p.update(bodyBounds);
      p.draw(ctx);
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
