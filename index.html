<!DOCTYPE html>
<html>
<head>
  <title>Pixel Rain Body Avoidance</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let lastMoveTime = 0;
let isPlaying = false;
let firstClick = false;

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
window.addEventListener('click', ()=>{
  if(firstClick) return;
  firstClick = true;
  garbha.play().catch(e=>console.log("Audio play error:", e));
});

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= PIXEL RAIN =================
class PixelDrop{
  constructor(){
    this.reset();
  }
  reset(){
    this.x = Math.random()*1280;
    this.y = Math.random()*-720;
    this.vx = 0;
    this.vy = Math.random()*4 + 4;
    this.size = Math.random()*2 + 1; // pixel kecil
    this.active = true;
  }
  update(keypoints){
    if(!this.active) return;
    // collision avoidance
    keypoints.forEach(k=>{
      if(k.score>0.4 && k.name!=="nose" && k.name!=="left_eye" && k.name!=="right_eye"){
        const dx = this.x - k.x;
        const dy = this.y - k.y;
        const dist = Math.hypot(dx,dy);
        if(dist < 10){ // threshold avoidance pixel
          const angle = Math.atan2(dy,dx);
          const force = 2;
          this.vx += Math.cos(angle)*force;
          this.vy += Math.sin(angle)*force;
        }
      }
    });
    // gravity + small wind
    this.vy += 0.05;
    this.vx += (Math.random()-0.5)*0.1;

    this.x += this.vx;
    this.y += this.vy;

    if(this.y > canvas.height){
      this.reset();
    }
  }
  draw(){
    ctx.fillStyle = "rgba(0,150,255,0.9)";
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

let drops = [];
for(let i=0;i<800;i++){
  drops.push(new PixelDrop());
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;
    let keypoints = [];

    poses.forEach(pose=>{
      pose.keypoints.forEach(k=>{
        keypoints.push(k);
        if(k.score>0.4){
          const speed = getSpeed(lastFrame[k.name],k);
          lastFrame[k.name] = k;
          totalSpeed += speed;
          count++;
          if(speed>6) detectedMovement = true;
        }
      });
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // Audio logic
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }

    if(isPlaying){
      garbha.playbackRate = Math.min(2, Math.max(1, 1 + avgSpeed/10));
    }

    if(isPlaying && Date.now() - lastMoveTime > 800){
      garbha.pause();
      isPlaying = false;
    }

    // update & draw pixel rain
    drops.forEach(d=>{
      d.update(keypoints);
      d.draw();
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
