<!DOCTYPE html>
<html>
<head>
  <title>GARBHA INFERNO + TOPENG REALTIME</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:640,height:480,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= AUDIO =================
const garbha = new Audio("garbha.mp3");
garbha.loop = true;
let firstClick = false;
let isPlaying = false;
let lastMoveTime = 0;

window.addEventListener('click', async ()=>{
  if(firstClick) return;
  firstClick = true;
  try{
    await garbha.play();
    garbha.pause();
  }catch(e){console.log(e);}
});

// ================= PARTICLE SYSTEM =================
class Particle {
  constructor(x,y,type){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*0.5;
    this.vy = (type==="fire"?-Math.random()*2:-Math.random()*0.3);
    this.life = 1;
    this.size = type==="fire"?Math.random()*6+4:Math.random()*8+4;
    this.type = type;
  }
  update(){ 
    this.x += this.vx; 
    this.y += this.vy; 
    this.life -= 0.01;
  }
  draw(ctx){
    ctx.globalAlpha = this.life;
    if(this.type==="fire"){
      const grd = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size);
      grd.addColorStop(0,"rgba(255,150,0,0.8)");
      grd.addColorStop(0.5,"rgba(255,50,0,0.5)");
      grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle = grd;
    } else {
      ctx.fillStyle = "rgba(150,150,150,0.2)";
    }
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

let particles = [];
let lastFrame = {};
let detector;

// ================= TOPENG REALTIME =================
function drawMask(keypoints){
  // ambil titik mata, hidung, mulut
  const leftEye = keypoints.find(k=>k.name==="left_eye");
  const rightEye = keypoints.find(k=>k.name==="right_eye");
  const nose = keypoints.find(k=>k.name==="nose");
  const mouth = keypoints.find(k=>k.name==="mouth");

  if(leftEye && rightEye && nose && mouth){
    const width = Math.abs(rightEye.x-leftEye.x)*2;
    const height = Math.abs(mouth.y-nose.y)*2;

    const centerX = (leftEye.x+rightEye.x)/2;
    const centerY = (nose.y+mouth.y)/2;

    // gambar topeng
    ctx.save();
    ctx.translate(centerX,centerY);
    ctx.fillStyle = "rgba(50,50,50,0.7)";
    ctx.strokeStyle = "orange";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0,0,width,height,0,0,2*Math.PI);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

// ================= MOTION =================
function getSpeed(prev,curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    let detectedMovement = false;
    let totalSpeed = 0;
    let count = 0;

    poses.forEach(pose=>{
      const keypoints = pose.keypoints;
      // spawn particles hanya di tubuh (hindari muka)
      keypoints.forEach(k=>{
        if(k.score>0.4){
          const speed = lastFrame[k.name]?Math.hypot(k.x-lastFrame[k.name].x,k.y-lastFrame[k.name].y):0;
          if(speed>1) detectedMovement = true;
          totalSpeed += speed;
          count++;
          lastFrame[k.name] = k;

          // api & asap
          if(!["nose","left_eye","right_eye","mouth"].includes(k.name)){
            for(let i=0;i<2;i++){
              particles.push(new Particle(k.x,k.y,"fire"));
              particles.push(new Particle(k.x,k.y,"smoke"));
            }
          }
        }
      });

      // draw mask di wajah
      drawMask(keypoints);
    });

    const avgSpeed = count>0 ? totalSpeed/count : 0;

    // audio
    if(detectedMovement && firstClick){
      lastMoveTime = Date.now();
      if(!isPlaying){
        garbha.play().catch(e=>console.log(e));
        isPlaying = true;
      }
    }
    if(isPlaying){
      garbha.playbackRate = Math.min(2,1+avgSpeed/5);
    }
    if(isPlaying && Date.now()-lastMoveTime>800){
      garbha.pause();
      isPlaying = false;
    }

    // update particles
    particles.forEach(p=>{p.update(); p.draw(ctx);});
    particles = particles.filter(p=>p.life>0);

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>

</body>
</html>
