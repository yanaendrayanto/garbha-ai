<!DOCTYPE html>
<html>
<head>
  <title>Pose AI STAGE PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{
      margin:0;
      overflow:hidden;
      background:black;
    }

    video,canvas{
      position:absolute;
      top:0;
      left:0;
      width:100vw;
      height:100vh;
      object-fit:cover;
      transform:scaleX(-1);
    }

    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;

      background:rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);

      padding:12px;
      border-radius:10px;

      color:#00ffff;
      font-size:13px;
      font-family:monospace;

      max-width:260px;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let trails = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"user"},
    audio:false
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= SUDUT =================
function sudut(A,B,C){
  if(!A||!B||!C) return null;
  const AB={x:A.x-B.x,y:A.y-B.y};
  const CB={x:C.x-B.x,y:C.y-B.y};
  const dot=AB.x*CB.x+AB.y*CB.y;
  const mag=Math.hypot(AB.x,AB.y)*Math.hypot(CB.x,CB.y);
  if(mag===0) return null;
  return Math.acos(dot/mag)*(180/Math.PI);
}

function safe(v){
  return (v && !isNaN(v)) ? v.toFixed(1) : '-';
}

// ================= GESTURE =================
function gesture(kp){
  if(!kp.left_wrist || !kp.left_shoulder) return "none";
  if(kp.left_wrist.y < kp.left_shoulder.y) return "raise";
  return "normal";
}

// ================= PARTICLE =================
function addTrail(x,y,color){
  trails.push({x,y,life:1,color});
}

function drawTrails(){
  trails.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;

    ctx.beginPath();
    ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.fill();

    p.life -= 0.02;
  });

  trails = trails.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= MAIN =================
async function main(){
  await setupCamera();

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  async function loop(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const poses = await detector.estimatePoses(video);

    poses.forEach((pose,i)=>{

      const kpArr = pose.keypoints;
      const kp = {};
      kpArr.forEach(k=>kp[k.name]=k);

      const g = gesture(kp);
      const hue = (i * 120) % 360;

      // ================= SKELETON =================
      const conn = [
        ['left_shoulder','right_shoulder'],
        ['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
        ['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
        ['left_shoulder','left_hip'],['right_shoulder','right_hip'],
        ['left_hip','right_hip'],
        ['left_hip','left_knee'],['left_knee','left_ankle'],
        ['right_hip','right_knee'],['right_knee','right_ankle']
      ];

      conn.forEach(([a,b])=>{
        if(kp[a]?.score>0.4 && kp[b]?.score>0.4){
          ctx.strokeStyle = `hsl(${hue},100%,60%)`;
          ctx.lineWidth = 3;

          ctx.beginPath();
          ctx.moveTo(kp[a].x, kp[a].y);
          ctx.lineTo(kp[b].x, kp[b].y);
          ctx.stroke();
        }
      });

      // ================= VISUAL =================
      kpArr.forEach(k=>{
        if(k.score>0.4){
          const z = k.z || 0;
          const size = 10 - z*8;
          const color = `hsl(${hue},100%,70%)`;

          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(k.x,k.y,size,0,Math.PI*2);
          ctx.fill();

          addTrail(k.x,k.y,color);

          if(g==="raise"){
            ctx.beginPath();
            ctx.arc(k.x,k.y,30,0,Math.PI*2);
            ctx.strokeStyle = color;
            ctx.stroke();
          }
        }
      });

      // ================= HUD DATA (HANYA DANCER 1) =================
      if(i===0){
        hud.textContent = `
KETINGGIAN (px)
Kepala: ${safe(kp.nose?.y)}
Bahu: ${safe(kp.left_shoulder?.y)}
Pinggul: ${safe(kp.left_hip?.y)}

SUDUT (°)
Siku Kiri: ${safe(sudut(kp.left_shoulder,kp.left_elbow,kp.left_wrist))}
Siku Kanan: ${safe(sudut(kp.right_shoulder,kp.right_elbow,kp.right_wrist))}

GESTURE
${g}
`;
      }

    });

    drawTrails();
    requestAnimationFrame(loop);
  }

  loop();
}

main();

// ================= TOGGLE HUD =================
window.addEventListener('keydown', e=>{
  if(e.key === 'h'){
    hud.style.display = hud.style.display === 'none' ? 'block' : 'none';
  }
});
</script>

</body>
</html>
