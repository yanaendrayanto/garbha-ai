<!DOCTYPE html>
<html>
<head>
  <title>GARBHA MODE - AI Dance System</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
    }
    #hud{
      position:fixed;
      top:20px;
      left:20px;
      z-index:9999;
      background:rgba(0,0,0,0.3);
      padding:12px;
      border-radius:10px;
      color:#00ffff;
      font-family:monospace;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="hud"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let particles = [];
let trails = {};
let historyData = [];

let lastFrame = {};
let energy = 0;

// FACE
let faceMesh;
let facePoints = [];
let frameSkip = 0;

// ================= CAMERA (ANTI HITAM) =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:640,height:480,facingMode:"user"} // lebih stabil
  });
  video.srcObject = stream;

  return new Promise(resolve=>{
    video.onloadedmetadata = ()=>{
      video.play();
      resolve();
    };
  });
}

// ================= AUDIO =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// fix autoplay
document.body.addEventListener('click', ()=>{
  audioCtx.resume();
});

function playSound(intensity){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = 150 + energy * 10;
  gain.gain.value = Math.min(0.15, energy/200);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ================= PARTICLE =================
function addSmoke(x,y){
  particles.push({
    x,y,
    vx:(Math.random()-0.5)*1.5,
    vy:(Math.random()-1)*1.2,
    size:Math.random()*6 + energy*0.05,
    life:1
  });
}

function drawSmoke(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "rgba(0,255,255,0.25)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
  });

  particles = particles.filter(p=>p.life>0);
  ctx.globalAlpha = 1;
}

// ================= TRAIL =================
function updateTrail(name,x,y){
  if(!trails[name]) trails[name]=[];
  trails[name].push({x,y});
  if(trails[name].length>15) trails[name].shift();
}

function drawTrail(){
  Object.values(trails).forEach(points=>{
    ctx.beginPath();
    points.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.strokeStyle="rgba(0,255,255,0.3)";
    ctx.stroke();
  });
}

// ================= SPEED =================
function getSpeed(prev, curr){
  if(!prev || !curr) return 0;
  return Math.hypot(curr.x-prev.x, curr.y-prev.y);
}

// ================= FACE DRAW =================
function drawFace(){
  facePoints.forEach(p=>{
    ctx.fillStyle = "rgba(255,0,200,0.5)";
    ctx.fillRect(p.x*canvas.width, p.y*canvas.height, 2,2);
  });
}

// ================= MAIN =================
async function main(){
  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
  );

  // FACE INIT (ANTI FREEZE)
  faceMesh = new FaceMesh({
    locateFile: (file)=>{
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
  });

  faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true
  });

  faceMesh.onResults(results=>{
    if(results.multiFaceLandmarks.length > 0){
      facePoints = results.multiFaceLandmarks[0];
    }
  });

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    // ================= POSE =================
    detector.estimatePoses(video).then(poses=>{

      poses.forEach(pose=>{

        let totalSpeed = 0;
        let count = 0;

        pose.keypoints.forEach(k=>{

          if(k.score>0.4){

            updateTrail(k.name,k.x,k.y);
            addSmoke(k.x,k.y);

            const speed = getSpeed(lastFrame[k.name],k);
            totalSpeed += speed;
            count++;

            if(speed>12){
              playSound(speed);
            }

            lastFrame[k.name] = k;
          }
        });

        energy = totalSpeed / (count || 1);

        historyData.push({
          time: Date.now(),
          energy: energy
        });

      });

    });

    // ================= FACE (THROTTLE) =================
    frameSkip++;
    if(frameSkip % 3 === 0){
      faceMesh.send({image: video});
    }

    drawTrail();
    drawSmoke();
    drawFace();

    // HUD
    hud.innerHTML = `
      ENERGY: ${energy.toFixed(2)}<br>
      PARTICLES: ${particles.length}
    `;

    requestAnimationFrame(draw);
  }

  draw();
}

main();

// ================= EXPORT =================
window.addEventListener('keydown', e=>{
  if(e.key === 's'){
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(historyData));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "dance_data.json");
    dl.click();
  }
});
</script>

</body>
</html>
