<!DOCTYPE html>
<html>
<head>
  <title>Pixel Water Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body{margin:0;overflow:hidden;background:black;}
    video,canvas{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastFrame = {};
let particles = [];

// ================= CAMERA =================
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,facingMode:"user"}
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// ================= PARTICLE =================
class Particle{
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*1;
    this.vy = Math.random()*3 + 2;
    this.size = Math.random()*4 + 4;
    this.alpha = Math.random()*0.5 + 0.5;
  }
  update(bodyPoints){
    // cek jarak ke setiap keypoint tubuh
    bodyPoints.forEach(p=>{
      const dx = this.x - p.x;
      const dy = this.y - p.y;
      const dist = Math.hypot(dx,dy);
      if(dist < 40){ // radius sekitar tubuh
        this.x += dx/dist*2; // dorong menjauh
        this.y += dy/dist*2;
      }
    });
    this.x += this.vx;
    this.y += this.vy;
    if(this.y > canvas.height) this.y = -10; // loop ke atas
    if(this.x < 0) this.x = canvas.width;
    if(this.x > canvas.width) this.x = 0;
  }
  draw(ctx){
    ctx.fillStyle = `rgba(0,150,255,${this.alpha})`;
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

// ================= MOTION =================
function getKeypoints(poses){
  let points = [];
  poses.forEach(pose=>{
    pose.keypoints.forEach(k=>{
      if(k.score > 0.4){
        points.push({x:k.x,y:k.y});
      }
    });
  });
  return points;
}

// ================= MAIN =================
async function main(){
  await setupCamera();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING}
  );

  // buat partikel awal
  for(let i=0;i<800;i++){
    particles.push(new Particle(Math.random()*canvas.width, Math.random()*canvas.height));
  }

  async function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0);

    const poses = await detector.estimatePoses(video);
    const bodyPoints = getKeypoints(poses);

    // update dan draw partikel
    particles.forEach(p=>{
      p.update(bodyPoints);
      p.draw(ctx);
    });

    requestAnimationFrame(draw);
  }

  draw();
}

main();
</script>
</body>
</html>
