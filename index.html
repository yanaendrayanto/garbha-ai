<!DOCTYPE html>
<html>
<head>
  <title>Pose AI LIDAR PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.13.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <style>
    body{
      display:flex;
      flex-direction:row;
      justify-content:center;
      align-items:flex-start;
      background:#111;
      color:white;
      font-family:sans-serif;
      margin:20px;
    }

    #container{
      position:relative;
    }

    video,canvas{
      width:480px;
      height:480px;
      position:absolute;
      top:0;
      left:0;
      transform:scaleX(-1);
    }

    #panel{
      margin-left:20px;
      width:260px;
      background:#222;
      padding:10px;
      font-size:14px;
      white-space:pre-wrap;
    }

    button{
      position:fixed;
      right:20px;
      padding:10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    #capture{ top:20px; background:#28a745; color:white; }
    #kalibrasi{ top:70px; background:#007bff; color:white; }
  </style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
</div>

<div id="panel"></div>

<button id="capture">📸 Capture</button>
<button id="kalibrasi">📏 Kalibrasi</button>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');

let tinggiReal = 170; // default
let scaleCm = null;

// smoothing
let prev = {};

// koneksi skeleton
const conn = [
['left_shoulder','right_shoulder'],
['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
['left_shoulder','left_hip'],['right_shoulder','right_hip'],
['left_hip','right_hip'],
['left_hip','left_knee'],['left_knee','left_ankle'],
['right_hip','right_knee'],['right_knee','right_ankle']
];

// kamera
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:{ideal:640},height:{ideal:480},facingMode:"user"},
    audio:false
  });
  video.srcObject = stream;
  return new Promise(r=>video.onloadeddata=r);
}

// smoothing posisi
function smooth(name,x,y){
  if(!prev[name]) prev[name]={x,y};
  prev[name].x = prev[name].x*0.7 + x*0.3;
  prev[name].y = prev[name].y*0.7 + y*0.3;
  return prev[name];
}

// sudut
function sudut(A,B,C){
  if(!A||!B||!C) return null;
  const AB={x:A.x-B.x,y:A.y-B.y};
  const CB={x:C.x-B.x,y:C.y-B.y};
  const dot=AB.x*CB.x+AB.y*CB.y;
  const mag=Math.hypot(AB.x,AB.y)*Math.hypot(CB.x,CB.y);
  return Math.acos(dot/mag)*(180/Math.PI);
}

// draw lidar effect
function drawLidar(minY,maxY){
  for(let y=minY;y<maxY;y+=10){
    ctx.strokeStyle=`rgba(0,255,255,${1-(y-minY)/(maxY-minY)})`;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
}

// main
async function main(){
  await setupCamera();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:poseDetection.movenet.modelType.SINGLEPOSE_THUNDER}
  );

  async function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const poses = await detector.estimatePoses(video,{flipHorizontal:true});
    if(!poses.length){
      panel.textContent="Tidak terdeteksi";
      return requestAnimationFrame(loop);
    }

    const kp = poses[0].keypoints.reduce((a,k)=>{a[k.name]=k;return a;},{})

    const kepala = kp.nose;
    const kaki = kp.left_ankle?.score>0.3?kp.left_ankle:kp.right_ankle;

    if(!kepala || !kaki){
      panel.textContent="Tampilkan full body";
      return requestAnimationFrame(loop);
    }

    const minY = kepala.y;
    const maxY = kaki.y;

    // lidar effect
    drawLidar(minY,maxY);

    // skeleton
    conn.forEach(([a,b])=>{
      if(kp[a]?.score>0.3 && kp[b]?.score>0.3){
        const A = smooth(a,kp[a].x,kp[a].y);
        const B = smooth(b,kp[b].x,kp[b].y);

        ctx.strokeStyle="cyan";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(A.x,A.y);
        ctx.lineTo(B.x,B.y);
        ctx.stroke();
      }
    });

    // titik
    Object.entries(kp).forEach(([n,k])=>{
      if(k.score>0.3){
        const p = smooth(n,k.x,k.y);
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(p.x,p.y,4,0,Math.PI*2);
        ctx.fill();
      }
    });

    const tinggiPixel = maxY - minY;
    if(scaleCm===null) scaleCm = tinggiReal / tinggiPixel;

    const toCm = y => (y - minY) * scaleCm;

    const safe = v => v? v.toFixed(1):'-';

    panel.textContent = `
TINGGI BADAN (REAL)
Total: ${safe(tinggiReal)}

KETINGGIAN TITIK (cm)
Kepala: ${safe(toCm(kp.nose?.y))}
Bahu: ${safe(toCm(kp.left_shoulder?.y))}
Pinggul: ${safe(toCm(kp.left_hip?.y))}
Lutut: ${safe(toCm(kp.left_knee?.y))}
Kaki: ${safe(toCm(kp.left_ankle?.y))}

SUDUT
Siku: ${safe(sudut(kp.left_shoulder,kp.left_elbow,kp.left_wrist))}
Lutut: ${safe(sudut(kp.left_hip,kp.left_knee,kp.left_ankle))}
`;

    requestAnimationFrame(loop);
  }

  loop();

  // kalibrasi
  document.getElementById('kalibrasi').onclick=()=>{
    const input = prompt("Masukkan tinggi badan (cm):");
    if(input){
      tinggiReal = parseFloat(input);
      scaleCm = null;
    }
  };

  // capture
  document.getElementById('capture').onclick=()=>{
    const temp=document.createElement('canvas');
    const t=temp.getContext('2d');

    temp.width=canvas.width;
    temp.height=canvas.height;

    t.scale(-1,1);
    t.drawImage(video,-canvas.width,0);
    t.setTransform(1,0,0,1,0,0);
    t.drawImage(canvas,0,0);

    const link=document.createElement('a');
    link.download="pose_lidar.jpg";
    link.href=temp.toDataURL();
    link.click();
  };
}

main();
</script>

</body>
</html>
